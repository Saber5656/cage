name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
      - name: Check workflow trigger policy
        run: ruby scripts/check-workflow-triggers.rb
      - name: Test workflow trigger guard
        run: ruby scripts/check_workflow_triggers_test.rb
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Run tests
        run: cargo test --all-features --locked

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@b39830659426cc462634adb474604619960ae92d # 1.85
      - name: Check MSRV
        run: cargo check --all-targets --all-features --locked
